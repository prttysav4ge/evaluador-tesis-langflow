# ============================================================================
# PLANTILLA de Secrets para STREAMLIT COMMUNITY CLOUD (producción).
#
# NO es el archivo que usa tu app en local (ese es secrets.toml, ignorado por
# git y apuntando a localhost). Copia ESTE contenido en:
#     Streamlit Cloud → tu app → Settings → Secrets
# y rellena los valores reales. No subas valores reales a git.
# ============================================================================

# ----- Servidor -----
HOST = "0.0.0.0"
PORT = "8000"
DEBUG = "false"          # en producción: false (menos ruido en logs)

# ----- LLM (OpenAI gpt-4o-mini) -----
# Sigue siendo necesario: lo usan la generación de "texto sugerido" y el
# fallback Python. Los 6 agentes principales corren en Langflow (HF Space).
LLM_PROVIDER = "openai"
OPENAI_API_KEY = "sk-proj-TU_CLAVE_OPENAI"
OPENAI_MODEL = "gpt-4o-mini"

# ----- Langflow (motor de agentes, alojado en el HF Space) -----
USE_LANGFLOW = "true"
# URL pública del Space (Settings del Space → "Direct URL" / "<user>-<space>.hf.space").
LANGFLOW_URL = "https://TU-USUARIO-evaluador-tesis-langflow.hf.space"
# Nombre de endpoint estable horneado en el flujo (NO el UUID).
LANGFLOW_FLOW_ID = "evaluador-tesis"
# Dejar VACÍO: con AUTO_LOGIN=false en el Space, el cliente hace login con el
# superusuario y crea/renueva la API key en runtime (sobrevive a reinicios del
# Space, que vacían su DB efímera). Solo pon una key fija si la creas a mano.
LANGFLOW_API_KEY = ""
# Mismas credenciales que pusiste en los Secrets del HF Space.
LANGFLOW_SUPERUSER = "admin"
LANGFLOW_SUPERUSER_PASSWORD = "PON_UNA_CONTRASEÑA_FUERTE"

# ----- Embeddings -----
EMBEDDING_MODEL = "intfloat/multilingual-e5-small"

# ----- ChromaDB -----
CHROMA_PERSIST_DIR = "./chroma_db"
CHROMA_COLLECTION = "academic_thesis"

# ----- RAG / Chunking -----
TOP_K = "5"
CHUNK_SIZE = "800"
CHUNK_OVERLAP = "150"
